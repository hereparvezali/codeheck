[package]
name = "codeheck"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "migration"]

[dependencies]
axum = "0.8.4"
tokio = { version = "1.47.0", features = ["full"] }
serde = { version = "1.0.219", features = ["derive"] }
dotenvy = "0.15"
tower = "0.5.2"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0.98"
sea-orm = { version = "1.0.0", features = [
    "runtime-tokio-rustls",
    "sqlx-postgres",
] }
